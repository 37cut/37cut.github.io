<!DOCTYPE html>
<html>
<head>
    <title>-w-</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="cutt37's userspace">

    <style>
        #head {
            margin-block: 16px;
        }
        
        #head p {
            font-size: 24px;
            margin-block: 8px;
        }

        #list-head {
            font-size: 22px;
            font-weight: bold;
            margin-top: 12px;
            margin-bottom: 0;
        }

        #block {
            display: flex;
            flex-direction: row;
            width: 50vh;
            gap: 35px;
        }

        #block p {
            font-size: 20px;
            line-height: 4px;
        }

        #here {
            transition: font-weight 0.5s;
        }
        
        #fixed-image {
            transition: opacity 0.5s;
        }
        
        hr {
            margin-block: 16px;
        }

        body {
            display: none;
            width: 960px;
            margin-inline: auto;
        }

    </style>

    <script>
        window.addEventListener('DOMContentLoaded', function () {            
            const img = document.createElement('img');
            const here = document.getElementById('here');
            
            img.src = './files/lolisuki';
            img.id = 'fixed-image';

            img.style.position = 'fixed';
            img.style.pointerEvents = 'none';

            img.style.right = '960px';
            img.style.bottom = '10px';

            img.style.height = '70%';
            img.style.opacity = '0';

            document.body.appendChild(img);
            document.body.style.display = 'block';
            
            here.addEventListener('mouseover', function() {
                img.style.opacity = '0.6';
                here.style.fontWeight = 'bolder';
            })

            here.addEventListener('mouseout', function() {
                img.style.opacity = '0';
                here.style.fontWeight = 'normal';
            })
        })
        
    </script>
</head>

<body>
    <div id="head">
        <p>cutt37&rsquo;s userspace
        <p><i>I was <span id="here">here</span></i>
    </div>

    <hr>

    <p id="list-head">Entries

    <div id="block">
        <div id="list">
            <p>fedora:
            <p>python:
            <p>osu:
        </div>

        <div id="link">
            <p><a href="./files/fedora/readme.md">view</a>
            <p><a href="./files/python/readme.md">view</a>
            <p><a href="./files/osu/readme.md">view</a>
        </div>
    </div>

</body>
</html>
