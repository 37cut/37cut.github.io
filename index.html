<!DOCTYPE html>
<html>
<head>
    <title>owo</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="cutt37's userspace">

    <style>
        #title {
            font-size: 24px;
            margin-block: 16px;
        }
        
        #title p {
            margin-block: 8px;
        }

        #head {
            font-size: 22px;
            font-weight: bold;

            margin-top: 12px;
            margin-bottom: 0;

            width: 220px;
        }

        #root {
            display: flex;
            flex-direction: column;
            line-height: 4px;
        }

        #Entry.block {
            display: flex;
            flex-direction: row;

            font-size: 20px;
            min-width: 220px;

            gap: 35px;
        }

        hr {
            margin-block: 16px;
        }

        body {
            display: none;
        }

    </style>

    <script>
        function place_image(img) {
            if (window.innerWidth >= 1024) {
                img.style.right = window.getComputedStyle(document.body).marginRight;
            }
    
            else {
                img.style.right = '10px';
            }
        }
        
        function init() {
            const img = document.createElement('img');
            const here = document.getElementById('here');
            const root = document.getElementById('root');
            
            const mobile = /Mobile|Android|iPhone/i.test(navigator.userAgent);
            
            img.src = './files/lolisuki';
            img.id = 'fixed-image';

            img.style.position = 'fixed';
            img.style.pointerEvents = 'none';

            img.style.bottom = '10px';
            img.style.right = '10px';

            img.style.height = '72vh';
            img.style.opacity = '0';
            img.style.transition = 'opacity 0.5s';

            if (!mobile) {
                document.body.style.maxWidth = '1024px';
                document.body.style.marginInline = 'auto';
                document.body.style.paddingInline = '8px';
                
                here.addEventListener('mouseover', function() {
                    img.style.opacity = '0.6';
                    here.style.fontWeight = 'bold';

                    place_image(img);
                })

                here.addEventListener('mouseout', function() {
                    img.style.opacity = '0';
                    here.style.fontWeight = 'normal';

                    place_image(img);
                })

                window.addEventListener('resize', function() {
                    place_image(img);
                })
            }
            
            else {
                here.addEventListener('touchstart', function() {
                    img.style.opacity = '0.6';
                    here.style.fontWeight = 'bold';
                })
    
                here.addEventListener('touchend', function() {
                    img.style.opacity = '0';
                    here.style.fontWeight = 'normal';
                })
            }

            document.body.appendChild(img);
            document.body.style.display = 'block';
            document.body.style.height = '95vh';
        }
        
        window.addEventListener('DOMContentLoaded', init)
        
    </script>
</head>

<body>
    <div id="title">
        <p>cutt37&rsquo;s userspace
        <p><i>I was <span id="here">here</span></i>
    </div>

    <hr>

    <p id="head">Entries

    <div id="root">
        <div class="block" id="Entry">
            <div id="text">
                <p>fedora:
                <p>python:
                <p>osu:
            </div>

            <div id="hyperset">
                <p><a href="./files/fedora/readme.md">view</a>
                <p><a href="./files/python/readme.md">view</a>
                <p><a href="./files/osu/readme.md">view</a>
            </div>
        </div>
    </div>

</body>
</html>
