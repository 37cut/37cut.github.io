<!DOCTYPE html>
<html>
<head>
    <title>-w-</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="cutt37's userspace">

    <style>
        #title {
            font-size: 24px;
            margin-block: 16px;
        }
        
        #title p {
            margin-block: 8px;
        }

        #head {
            font-size: 22px;
            font-weight: bold;

            margin-top: 12px;
            margin-bottom: 0;

            width: 24vh;
        }

        #root {
            display: flex;
            flex-direction: row;
            line-height: 4px;
        }

        #A.block {
            display: flex;
            flex-direction: row;
            font-size: 20px;

            width: 24vh;
            height: 72vh;

            gap: 35px;
        }

        #B.block {
            font-size: 20px;
            width: 90vh;
            height: 72vh;
        }
        
        hr {
            margin-block: 16px;
        }

        body {
            display: none;
        }

    </style>

    <script>
        function init() {
            const img = document.createElement('img');
            const here = document.getElementById('here');
            
            const root = document.getElementById('root');
            const blockB = document.getElementById('B');

            const mobile = /Mobile|Android|iPhone/i.test(navigator.userAgent);
            
            img.src = './files/lolisuki';
            img.id = 'fixed-image';

            img.style.position = 'fixed';
            img.style.pointerEvents = 'none';

            img.style.bottom = '10px';
            img.style.right = '10px';

            img.style.height = '75vh';
            img.style.opacity = '0';
            img.style.transition = 'opacity 0.5s';

            document.body.appendChild(img);
            document.body.style.display = 'block';
            document.body.style.height = '97vh';
            
            if (!mobile) {
                here.addEventListener('mouseover', function() {
                    img.style.opacity = '0.6';
                    here.style.fontWeight = 'bold';
                })

                here.addEventListener('mouseout', function() {
                    img.style.opacity = '0';
                    here.style.fontWeight = 'normal';
                })
            }
            
            else {
                root.style.flexDirection = 'column';
                blockB.style.height = '0';

                here.addEventListener('touchstart', function() {
                    img.style.opacity = '0.6';
                    here.style.fontWeight = 'bold';
                })
    
                here.addEventListener('touchend', function() {
                    img.style.opacity = '0';
                    here.style.fontWeight = 'normal';
                })
            }
        }
        
        window.addEventListener('DOMContentLoaded', init)
        
    </script>
</head>

<body>
    <div id="title">
        <p>cutt37&rsquo;s userspace
        <p><i>I was <span id="here">here</span></i>
    </div>

    <hr>

    <p id="head">Entries

    <div id="root">
        <div class="block" id="A">
            <div id="text">
                <p>fedora:
                <p>python:
                <p>osu:
            </div>

            <div id="text">
                <p><a href="./files/fedora/readme.md" target="_frame">view</a>
                <p><a href="./files/python/readme.md">view</a>
                <p><a href="./files/osu/readme.md">view</a>
            </div>
        </div>

        <div class="block" id="B">
            <div id="text">
                
            </div>
        </div>
    </div>

</body>
</html>
